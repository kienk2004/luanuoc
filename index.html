<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tính Năng Suất Lúa</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#42a5f5,#1565c0);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:450px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

h1{
    text-align:center;
    color:#1976d2;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-weight:bold;
    color:#1565c0;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #90caf9;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#2196f3;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1565c0;
}

#result{
    margin-top:20px;
    padding:15px;
    background:#e3f2fd;
    border-left:5px solid #1976d2;
    border-radius:8px;
    font-size:18px;
    color:#0d47a1;
}
</style>

</head>
<body>

<div class="container">

<h1>TÍNH NĂNG SUẤT LÚA</h1>

<label>Diện tích đất (ha)</label>
<input type="number" id="area">

<label>Lượng lúa gieo trồng (kg)</label>
<input type="number" id="seed">

<label>Lượng nước cần cho lúa (m³)</label>
<input type="number" id="water">

<button onclick="calculate()">
Tính năng suất lúa
</button>

<div id="result">
Kết quả sẽ hiển thị tại đây.
</div>

</div>

<script>

function calculate(){

    let area = parseFloat(document.getElementById("area").value);
    let seed = parseFloat(document.getElementById("seed").value);
    let water = parseFloat(document.getElementById("water").value);

    if(isNaN(area)||isNaN(seed)||isNaN(water)||area<=0||water<=0){

        document.getElementById("result").innerHTML="Vui lòng nhập đầy đủ dữ liệu.";
        return;

    }

    let productivity=(seed*water)/area;

    document.getElementById("result").innerHTML=
    "<b>Năng suất lúa ước tính:</b> "+
    productivity.toFixed(2);

}

</script>

</body>
</html>
